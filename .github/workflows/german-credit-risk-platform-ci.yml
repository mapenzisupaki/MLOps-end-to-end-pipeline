name: german-credit-risk-platform-ci

on:
  push:
    paths:
      - "german_credit_risk_platform/**"
      - ".github/workflows/german-credit-risk-platform-ci.yml"
  pull_request:
    paths:
      - "german_credit_risk_platform/**"
      - ".github/workflows/german-credit-risk-platform-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: german_credit_risk_platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest -q
